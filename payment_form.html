<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Form</title>
    <link rel="stylesheet" href="style.css">
    <style>
    </style>
</head>

<body>
    <em>
        <h1>Payment Form</h1>
        <hr>
        <h2>Contact Information</h2>
        <h3>Required Field are followed by *</h3>
        <p *> Name <input type="text" name="name" required>
        </p>
        <fieldset>
            <legend>Gender</legend>
            <p>Male <input type="radio" name="gender" id="Male" required></p>
            <p>Female <input type="radio" name="gender" id="female" required></p>
        </fieldset>
        <em>

            Address: <textarea name="address" id="address" cols="100" rows="8" input type="text" required></textarea>
        </em>
        <em>
            <p>Email: <input type="email" id="email" input type="email" required>
            </p>
            <p>Pincode <input type="pincode" id="pincode" input type="pincode" required>
            </p>
            <h2>Payment Information</h2>
            <p>
                Card Type:
                <select name="card_type" id="card_type" required>
                    <option value="">---Select Card Type---</option>
                    <option value="Visa">Visa</option>
                    <option value="MasterCard">MasterCard</option>
                    <option value="RuPay">RuPay</option>
                </select>
            </p>
            <p>
                Card Number <input type="number" name="cardnumber" id="cardnumber" required>
            </p>
            <p class="special">
                Expiration Date: <input type="date" name="exp_date" id="exp_date" required>
            </p>
            <p>
                CVV <input type="password" name="password" id="password" required>
            </p>
            <input type="submit" value="Pay Now">
            </form>
</body>

</html>>
